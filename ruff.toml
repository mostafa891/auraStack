line-length = 100
target-version = "py313"

[lint]
select = ["E", "F", "I", "UP", "B"]
fixable = ["ALL"]

[lint.per-file-ignores]
# الاستثناء الخاص بملفات الإعدادات المقسمة
"core/settings/*.py" = ["F403", "F405"]

# التعديل الجديد: سحق خطأ طول السطر (E501) داخل جميع ملفات الميجريشنز تلقائياً
"**/migrations/*.py" = ["E501"]