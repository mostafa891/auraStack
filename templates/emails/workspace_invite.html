<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Our Team on AuraStack</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; margin: 0; padding: 40px 20px;">
  <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" max-width="600" style="max-width: 600px; background-color: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
    <tr>
      <td style="padding: 40px 40px 20px 40px; text-align: center;">
        <span style="font-size: 28px; font-weight: 800; color: #4f46e5; text-decoration: none;">AuraStack</span>
      </td>
    </tr>
    <tr>
      <td style="padding: 20px 40px 40px 40px;">
        <h1 style="font-size: 22px; font-weight: 700; color: #0f172a; margin-top: 0; margin-bottom: 16px;">You have been invited!</h1>
        <p style="font-size: 16px; line-height: 24px; color: #475569; margin: 0 0 24px 0;">
          <strong>{{ inviter }}</strong> has invited you to join the <strong>{{ workspace_name }}</strong> workspace on AuraStack.
        </p>
        <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 24px;">
          <tr>
            <td align="center">
              <a href="{{ invite_url }}" style="display: inline-block; background-color: #4f46e5; color: #ffffff; font-size: 16px; font-weight: 600; text-decoration: none; padding: 14px 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);">
                Accept Invitation
              </a>
            </td>
          </tr>
        </table>
        <p style="font-size: 12px; line-height: 18px; color: #94a3b8; margin: 0; border-top: 1px solid #f1f5f9; padding-top: 16px;">
          If the button doesn't work, copy and paste this URL into your browser: <br/>
          <a href="{{ invite_url }}" style="color: #4f46e5; text-decoration: none;">{{ invite_url }}</a>
        </p>
      </td>
    </tr>
    <tr>
      <td style="padding: 20px 40px 40px 40px; border-top: 1px solid #f1f5f9; text-align: center; font-size: 14px; color: #94a3b8;">
        © 2026 AuraStack. All rights reserved.
      </td>
    </tr>
  </table>
</body>
</html>
