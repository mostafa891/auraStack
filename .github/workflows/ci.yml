name: AuraFlow CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auraflow_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Frontend Build Verification
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm ci

    - name: Build Frontend Assets
      run: npm run build

    # 2. Python Setup
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps chromium

    # 3. Linting and Formatting Check (Ruff)
    - name: Run Linter (Ruff)
      run: ruff check .

    - name: Run Formatter Check (Ruff)
      run: ruff format --check .

    # 4. Django Migrations Consistency Check
    - name: Check Database Migrations Consistency
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/auraflow_test
        SECRET_KEY: "ci-secret-key-for-testing"
      run: |
        python manage.py makemigrations --check --dry-run

    # 5. Execute Tests (Pytest)
    - name: Run Pytest Suite
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/auraflow_test
        SECRET_KEY: "ci-secret-key-for-testing"
      run: |
        pytest
