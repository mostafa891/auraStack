version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=core.settings.production
      - DJANGO_SECURE_SSL_REDIRECT=False
      - DATABASE_URL=postgres://postgres:postgres@db:5432/auraflow
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: python manage.py qcluster
    env_file:
      - .env
    environment:
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=core.settings.production
      - DATABASE_URL=postgres://postgres:postgres@db:5432/auraflow
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=auraflow
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auraflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
